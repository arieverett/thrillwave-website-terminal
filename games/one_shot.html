<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow"><title>ONE SHOT</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"><link rel="stylesheet" href="arcade.css"></head><body><div class="frame"><div class="frame-label tl">thrill_wave</div><div class="frame-label bl" id="clock">00:00:00</div><div class="frame-label br">07 / one_shot</div></div><main class="wrap"><div class="shell"><div class="topbar"><a class="brand" href="index.html">thrill_wave / break_room</a><div class="controls"><button id="audioBtn">audio</button><button id="resetBtn">reset</button></div></div><section class="terminal"><div class="terminal-bar"><div class="title">one_shot.exe</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot live"></div></div></div><div class="game-wrap"><div class="psx-outer"><canvas class="game" id="c" width="400" height="500"></canvas><div class="scanlines"></div><div class="vignette"></div><div class="phosphor"></div><div class="screen" id="startScr"><div class="psx-box"><div class="psx-eyebrow">— THRILL WAVE ARCADE —</div><div class="psx-title">ONE<br><span class="hl">SHOT</span></div><div class="psx-sub">JUMP THE CHAOS. GET THE TAKE.</div><div class="psx-ctrls"><div class="psx-ctrl"><div class="psx-key">SPC</div><div class="psx-ctrl-lbl">JUMP</div></div><div class="psx-ctrl"><div class="psx-key">↓</div><div class="psx-ctrl-lbl">DUCK</div></div><div class="psx-ctrl"><div class="psx-key">TAP</div><div class="psx-ctrl-lbl">MOBILE</div></div></div><button class="psx-btn" id="startBtn">▶ START</button><div class="blink">COMPLETE THE RUN IN UNDER 60 SEC</div></div></div><div class="screen hidden" id="endScr"><div class="psx-box"><div class="psx-eyebrow" id="endEye">— RESULT —</div><div class="psx-title" id="endTitle">RUN<br><span class="hl">COMPLETE</span></div><div class="psx-sub" id="endSub">final score 00000</div><button class="psx-btn" id="againBtn">▶ PLAY AGAIN</button></div></div><div class="mobile-pad"><div class="pad-side"><button class="pad-btn" id="leftPad">◀</button><button class="pad-btn" id="rightPad">▶</button></div><div class="pad-side"><button class="pad-btn" id="actionPad">A</button></div></div></div></div></section><div class="foot"><div>space / tap <span>jump</span></div><div>down / s <span>duck</span></div><div>finish the take in 55 seconds</div></div></div></main><script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;const W=400,H=500;
const startScr=document.getElementById('startScr'),endScr=document.getElementById('endScr'),startBtn=document.getElementById('startBtn'),againBtn=document.getElementById('againBtn'),resetBtn=document.getElementById('resetBtn'),audioBtn=document.getElementById('audioBtn');
const leftPad=document.getElementById('leftPad'),rightPad=document.getElementById('rightPad'),actionPad=document.getElementById('actionPad');
const C={sky0:'#101830',sky1:'#203c78',sky2:'#4e77ad',sun:'#fff3ad',white:'#fff',ink:'#061020',blue:'#4488ff',navy:'#00114a',green:'#44ff88',green2:'#77dd33',yellow:'#ffee44',orange:'#ff9944',red:'#ff4455',purple:'#aa77ff',cyan:'#66eeff',muted:'#7799cc',grey:'#768090',black:'#000',dark:'#0b1020'};
let state='idle',frame=0,last=0,score=0,high=Number(localStorage.getItem(location.pathname+'_high')||0),audioOn=true,keys={},pointer={down:false,x:200,y:250};
function clock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString([], {hour12:false})}clock();setInterval(clock,1000);
function pad(n,l=5){return String(Math.max(0,Math.floor(n))).padStart(l,'0')}
let ac=null;function tone(a,b,d=.08,t='square',v=.06){if(!audioOn)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();let o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(a,ac.currentTime);o.frequency.exponentialRampToValueAtTime(Math.max(20,b),ac.currentTime+d*.82);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d+.02)}catch(e){}}
const sfx={start:()=>{tone(240,520,.13,'square',.08);setTimeout(()=>tone(520,1040,.1,'triangle',.04),80)},jump:()=>tone(180,520,.13,'square',.07),hit:()=>{tone(120,45,.28,'sawtooth',.1);setTimeout(()=>tone(70,35,.22,'square',.05),70)},coin:()=>tone(520,900,.08,'triangle',.06),win:()=>{tone(520,880,.14,'square',.07);setTimeout(()=>tone(700,1320,.18,'triangle',.07),110)},fire:()=>tone(760,440,.05,'square',.04),click:()=>tone(760,520,.04,'square',.035)};
audioBtn.onclick=()=>{audioOn=!audioOn;audioBtn.textContent=audioOn?'audio':'mute';if(audioOn)sfx.click()};resetBtn.onclick=()=>resetGame();startBtn.onclick=()=>startGame();againBtn.onclick=()=>startGame();
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault();onKey(e.key.toLowerCase(),true)});addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;onKey(e.key.toLowerCase(),false)});
cv.addEventListener('pointerdown',e=>{pointer.down=true;let r=cv.getBoundingClientRect();pointer.x=(e.clientX-r.left)/r.width*W;pointer.y=(e.clientY-r.top)/r.height*H;onPointer(true)});cv.addEventListener('pointermove',e=>{let r=cv.getBoundingClientRect();pointer.x=(e.clientX-r.left)/r.width*W;pointer.y=(e.clientY-r.top)/r.height*H});addEventListener('pointerup',()=>{pointer.down=false;onPointer(false)});
function bindHold(el,prop){el.addEventListener('pointerdown',e=>{e.preventDefault();keys[prop]=true;onKey(prop,true)});el.addEventListener('pointerup',e=>{e.preventDefault();keys[prop]=false;onKey(prop,false)});el.addEventListener('pointerleave',()=>{keys[prop]=false;onKey(prop,false)})}
bindHold(leftPad,'arrowleft');bindHold(rightPad,'arrowright');actionPad.addEventListener('pointerdown',e=>{e.preventDefault();onAction(true)});actionPad.addEventListener('pointerup',e=>{e.preventDefault();onAction(false)});
function clear(){ctx.clearRect(0,0,W,H)}function R(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0)}function S(x,y,w,h,c){ctx.strokeStyle=c;ctx.strokeRect(x|0,y|0,w|0,h|0)}function T(txt,x,y,size=8,c=C.white,align='left'){ctx.font=`${size}px 'Press Start 2P', monospace`;ctx.textAlign=align;ctx.textBaseline='top';ctx.fillStyle='#00114a';ctx.fillText(txt,(x+2)|0,(y+2)|0);ctx.fillStyle=c;ctx.fillText(txt,x|0,y|0)}function P(pts,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(pts[0]|0,pts[1]|0);for(let i=2;i<pts.length;i+=2)ctx.lineTo(pts[i]|0,pts[i+1]|0);ctx.closePath();ctx.fill()}function line(x1,y1,x2,y2,c,w=1){ctx.strokeStyle=c;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1|0,y1|0);ctx.lineTo(x2|0,y2|0);ctx.stroke();ctx.lineWidth=1}function circ(x,y,r,c){ctx.fillStyle=c;for(let yy=-r;yy<=r;yy++){let hw=Math.sqrt(Math.max(0,r*r-yy*yy))|0;ctx.fillRect((x-hw)|0,(y+yy)|0,hw*2+1,1)}}
function dither(cx,cy,rw,rh,a=.45){ctx.fillStyle=`rgba(0,0,0,${a})`;for(let y=(cy-rh)|0;y<(cy+rh);y++)for(let x=(cx-rw+((y)&1))|0;x<(cx+rw);x+=2)ctx.fillRect(x,y,1,1)}
function drawSky(scroll=0){R(0,0,W,130,C.sky0);R(0,130,W,90,C.sky1);R(0,220,W,90,C.sky2);R(0,310,W,190,'#29435f');circ(330,62,30,C.sun);circ(326,58,20,'#fff');for(let i=0;i<7;i++){let x=((i*88-scroll*.08)%520)-80;P([x,250,x+48,152+(i%3)*18,x+106,250],'#152440');P([x+48,152+(i%3)*18,x+48,250,x+106,250],'#1d2d50')}for(let i=0;i<9;i++){let x=((i*70-scroll*.18)%520)-90;P([x,315,x+38,230+(i%4)*16,x+88,315],'#1d4129');P([x+38,230+(i%4)*16,x+38,315,x+88,315],'#152b22')}}
function explode(arr,x,y,c,n=16){for(let i=0;i<n;i++)arr.push({x,y,vx:(Math.random()*2-1)*130,vy:(Math.random()*2-1)*120,life:.6+Math.random()*.4,c})}
function particles(arr,dt){for(const p of arr){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=80*dt;p.life-=dt}for(let i=arr.length-1;i>=0;i--)if(arr[i].life<=0)arr.splice(i,1)}function drawParticles(arr){for(const p of arr){ctx.globalAlpha=Math.max(0,p.life);R(p.x,p.y,3,3,p.c);ctx.globalAlpha=1}}
function hud(title,progress,extra=''){T(title,14,14,8,C.white);T('SCORE '+pad(score),W-14,14,8,C.green,'right');T('BEST '+pad(high),W-14,30,6,C.yellow,'right');R(14,34,110,8,'#111');S(14,34,110,8,'#334');R(15,35,Math.max(0,Math.min(108,108*progress)),6,progress>.85?C.green:C.blue);if(extra)T(extra,14,48,6,C.muted)}
function end(win,title,sub){state='end';if(score>high){high=score;localStorage.setItem(location.pathname+'_high',high)}document.getElementById('endEye').textContent=win?'— MISSION CLEAR —':'— GAME OVER —';document.getElementById('endTitle').innerHTML=title;document.getElementById('endSub').textContent=sub+'  score '+pad(score);endScr.classList.remove('hidden');win?sfx.win():sfx.hit()}
function baseLoop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;if(state==='play')update(dt);draw();requestAnimationFrame(baseLoop)}
function resetGame(){location.reload()}function onKey(k,d){}function onPointer(d){}function onAction(d){}function update(dt){}function draw(){clear()}

let player={x:58,y:332,w:30,h:58,vy:0,ground:true,duck:false,inv:0},obs=[],pows=[],parts=[],scroll=0,spd=145,timer=0,lives=3,shield=0,slow=0,finished=false,spawnT=1,powT=5,duck=false;
const G=390;
function startGame(){sfx.start();startScr.classList.add('hidden');endScr.classList.add('hidden');state='play';frame=0;last=performance.now();score=0;scroll=0;spd=145;timer=0;lives=3;shield=0;slow=0;finished=false;spawnT=.9;powT=5;parts=[];obs=[];pows=[];player={x:58,y:G-58,w:30,h:58,vy:0,ground:true,duck:false,inv:0}}
function resetGame(){startGame()}
onKey=function(k,d){if((k===' '||k==='arrowup'||k==='w')&&d){if(state!=='play'){startGame();return}jump()} if((k==='arrowdown'||k==='s'))duck=d};
onPointer=function(d){if(d){if(state!=='play')startGame();else jump()}};onAction=function(d){if(d){if(state!=='play')startGame();else jump()}};
function jump(){if(player.ground){player.vy=-560;player.ground=false;sfx.jump();explode(parts,player.x+20,G,C.green,8)}}
const ground=[['loose_cable',42,20,'#222','#ffee44'],['dead_battery',34,30,'#334','#77ddff'],['client_note',55,26,'#eee','#ff4455'],['tripod_leg',26,44,'#444','#aaa'],['bad_brief',48,34,'#772222','#ff9944'],['sandbag',36,24,'#7a5225','#d0a15a']];
const air=[['boom_shadow',58,18,'#111','#aa77ff'],['legal_review',62,20,'#223366','#fff'],['talent_late',56,20,'#442244','#ffee44']];
function spawn(){let a=Math.random()<.24?air:ground;let p=a[Math.floor(Math.random()*a.length)],fly=a===air;let scale=.75+Math.random()*.65;obs.push({name:p[0],x:W+20,y:fly?G-150-Math.random()*50:G-p[2]*scale,w:p[1]*scale,h:p[2]*scale,fly,c1:p[3],c2:p[4],hit:false})}
function spawnPow(){let names=[['fresh_battery','shield'],['golden_hour','score'],['good_brief','slow']];let p=names[Math.floor(Math.random()*names.length)];pows.push({name:p[0],type:p[1],x:W+25,y:G-135-Math.random()*80,w:36,h:26})}
function hitBox(){return player.duck?{x:player.x+2,y:player.y+26,w:40,h:28}:{x:player.x+5,y:player.y+4,w:38,h:52}}
function collide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function update(dt){frame++;timer+=dt;let rate=slow>0?.62:1;scroll+=spd*dt*rate;spd=Math.min(245,145+timer*1.6);score+=dt*18*(shield>0?1.15:1);spawnT-=dt*rate;powT-=dt;if(spawnT<=0){spawn();spawnT=1.1+Math.random()*1.1}if(powT<=0){spawnPow();powT=7+Math.random()*5}player.duck=duck&&player.ground;player.h=player.duck?34:58;if(!player.ground){player.vy+=1180*dt;player.y+=player.vy*dt;if(player.y>=G-player.h){player.y=G-player.h;player.vy=0;player.ground=true;explode(parts,player.x+18,G,'#5a3a15',5)}}else player.y=G-player.h;if(player.inv>0)player.inv-=dt;if(shield>0)shield-=dt;if(slow>0)slow-=dt;for(const o of obs)o.x-=spd*dt*rate;for(const p of pows)p.x-=spd*dt*rate;let pb=hitBox();for(const o of obs){if(!o.hit&&collide(pb,o)){o.hit=true;explode(parts,o.x+o.w/2,o.y+o.h/2,o.c2,18);if(shield>0||player.inv>0){shield=0;sfx.coin();score+=80}else{lives--;player.inv=1.3;sfx.hit();if(lives<=0)return end(false,'TAKE<br><span class="hl">BLOWN</span>',o.name+' killed the momentum')}}}for(const p of pows){if(!p.hit&&collide(pb,p)){p.hit=true;score+=120;sfx.coin();explode(parts,p.x,p.y,C.green,14);if(p.type==='shield')shield=7;if(p.type==='slow')slow=4;if(p.type==='score')score+=300}}obs=obs.filter(o=>o.x+o.w>-40&&!o.hit);pows=pows.filter(p=>p.x+p.w>-40&&!p.hit);particles(parts,dt);if(timer>=55)return end(true,'SHOT<br><span class="hl">SECURED</span>','director approved / one take wonder')}
function drawOperator(){let x=player.x|0,y=player.y|0;if(player.inv>0&&Math.floor(frame/5)%2)return;dither(x+24,G+12,22,6,.45);if(shield>0){S(x-8,y-8,58,player.h+16,C.green);S(x-10,y-10,62,player.h+20,'rgba(68,255,136,.45)')}if(player.duck){R(x+4,y+14,32,13,C.blue);R(x+35,y+17,17,8,C.dark);R(x+42,y+19,10,4,C.black);R(x+10,y+27,26,5,C.orange);T('op',x+2,y+42,5,C.muted);return}R(x+12,y+2,14,15,'#f2b866');R(x+12,y+2,14,5,'#1c0a00');R(x+15,y+9,3,3,C.white);R(x+22,y+9,3,3,C.white);R(x+10,y+21,20,23,C.blue);R(x+10,y+22,4,20,'#66aaff');R(x+29,y+24,23,14,C.dark);R(x+50,y+28,11,6,C.black);R(x+3,y+29,8,18,'#f2b866');R(x+32,y+33,8,18,'#f2b866');R(x+12,y+43,7,18,C.orange);R(x+22,y+43,7,18,C.orange);R(x+8,y+59,12,5,C.black);R(x+22,y+59,12,5,C.black)}
function drawObstacle(o){if(o.fly){T(o.name,o.x,o.y-16,5,o.c2);P([o.x,o.y,o.x+o.w,o.y,o.x+o.w-6,o.y+o.h,o.x+6,o.y+o.h],o.c1);R(o.x+4,o.y+3,o.w-8,3,o.c2);return}dither(o.x+o.w/2,G+10,o.w*.45,5,.45);if(o.name==='client_note'){R(o.x,o.y,o.w,o.h,'#eee');R(o.x+4,o.y+4,o.w-8,2,o.c2);R(o.x+5,o.y+10,o.w-10,2,'#888');R(o.x+5,o.y+16,o.w-16,2,'#888')}else if(o.name==='loose_cable'){S(o.x,o.y+8,o.w,o.h*.55,o.c2);S(o.x+8,o.y+2,o.w-14,o.h*.7,o.c2);R(o.x+o.w-8,o.y+o.h-7,8,7,'#111')}else{R(o.x,o.y,o.w,o.h,o.c1);R(o.x+3,o.y+3,o.w-8,5,o.c2);R(o.x+5,o.y+o.h-6,o.w-10,3,'#000');T(o.name.slice(0,8),o.x+4,o.y+10,5,o.c2)}}
function drawPower(p){circ(p.x+18,p.y+13,12,C.green);R(p.x+7,p.y+10,22,6,C.white);T(p.name.split('_')[0],p.x-6,p.y+25,5,C.yellow)}
function draw(){clear();drawSky(scroll);for(let x=-((scroll*.65)%80);x<W;x+=80){R(x,372,42,6,'#1d4129');R(x+6,362,16,18,'#255230')}R(0,G,W,10,'#88cc22');R(0,G+10,W,H-G-10,'#5a3a15');R(0,G,W,3,'#bbff33');for(let x=-((scroll)%46);x<W;x+=46)R(x,G+24,24,3,'#7a5225');hud('ONE_SHOT.EXE',timer/55,'LIVES '+lives+'  '+(shield>0?'SHIELD':'ROLLING'));for(const p of pows)drawPower(p);for(const o of obs)drawObstacle(o);drawParticles(parts);drawOperator();if(state!=='play')T('PRESS START',120,250,8,C.green)}
requestAnimationFrame(baseLoop);
</script></body></html>
